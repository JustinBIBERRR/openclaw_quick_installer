name: Build & Release

on:
  push:
    tags:
      - "v*"           # 推送 v1.0.0 这类 tag 时触发
  workflow_dispatch:   # 也可以手动在 GitHub Actions 页面点触发

permissions:
  contents: write   # 允许 GITHUB_TOKEN 创建 Release 和上传附件

jobs:
  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest

    defaults:
      run:
        working-directory: openclaw_installer_windows

    steps:
      # ── 1. 拉取代码 ──────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. 安装 Node.js ──────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: openclaw_installer_windows/package-lock.json

      # ── 3. 安装 Rust stable (MSVC target) ────────────────────────
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      # ── 4. 缓存 Cargo 编译产物 ────────────────────────────────────
      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            openclaw_installer_windows/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('openclaw_installer_windows/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # ── 5. 安装前端依赖 ───────────────────────────────────────────
      - name: Install npm dependencies
        run: npm ci

      # ── 6. 下载内置 Node.js v22 便携包 ───────────────────────────
      #    这是打包进 exe 的运行时，用户无需自行安装 Node
      - name: Download bundled Node.js runtime
        shell: pwsh
        run: |
          $dest = "src-tauri/resources"
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          $url  = "https://npmmirror.com/mirrors/node/v22.11.0/node-v22.11.0-win-x64.zip"
          $out  = "$dest/node-v22-win-x64.zip"
          Write-Host "Downloading Node.js v22 portable..."
          Invoke-WebRequest -Uri $url -OutFile $out -UseBasicParsing
          $size = (Get-Item $out).Length / 1MB
          Write-Host "Downloaded: $([math]::Round($size,1)) MB"

      # ── 7. 构建 Tauri（生成 NSIS 安装包 + 便携 exe）─────────────
      - name: Build Tauri app
        run: npm run tauri build
        env:
          # 关闭 Rust 增量编译，CI 环境下节省空间
          CARGO_INCREMENTAL: "0"

      # ── 8. 列出产物路径，便于调试 ─────────────────────────────────
      - name: List build artifacts
        shell: pwsh
        run: |
          Write-Host "=== NSIS Installer ==="
          Get-ChildItem -Path "src-tauri/target/release/bundle/nsis/" -ErrorAction SilentlyContinue
          Write-Host "=== Portable EXE ==="
          Get-ChildItem -Path "src-tauri/target/release/" -Filter "*.exe" -ErrorAction SilentlyContinue

      # ── 9. 上传产物到 GitHub Artifacts（方便调试下载）────────────
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-installer-windows
          path: |
            openclaw_installer_windows/src-tauri/target/release/bundle/nsis/*.exe
            openclaw_installer_windows/src-tauri/target/release/OpenClaw*.exe
          if-no-files-found: warn
          retention-days: 7

      # ── 10. 发布到 GitHub Releases（仅推 tag 时执行）─────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "OpenClaw Installer ${{ github.ref_name }}"
          body: |
            ## OpenClaw 一键安装器 ${{ github.ref_name }}

            ### 下载说明
            - **`OpenClaw-Installer-Setup.exe`** — 标准安装包（推荐，有安装向导）
            - **`OpenClaw-Installer-Portable.exe`** — 便携版单文件（无需安装，直接运行）

            ### 使用方法
            1. 下载 `Setup.exe` 并运行
            2. 按向导完成 OpenClaw 安装
            3. 配置 AI API Key 后即可使用

            ### 系统要求
            - Windows 10 / 11 (64位)
            - 磁盘空间 ≥ 2GB
            - 网络连接（安装时需要）

            > 如 Windows Defender 弹出警告，点击"更多信息"→"仍要运行"即可
          draft: false
          prerelease: false
          files: |
            openclaw_installer_windows/src-tauri/target/release/bundle/nsis/*.exe
            openclaw_installer_windows/src-tauri/target/release/OpenClaw*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
